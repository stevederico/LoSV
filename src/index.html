<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legend of Silicon Valley: A Founder's Journey</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }
        canvas {
            display: block;
        }

        /* HUD Styling */
        #game-hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Top-left: Funding & Runway */
        #funding-runway {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #FFD700;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #rupees {
            margin-bottom: 8px;
        }

        #life-hearts {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .heart {
            width: 20px;
            height: 20px;
            background: url('/assets/textures/ui/heart.png') center/contain no-repeat;
        }

        .heart.empty {
            opacity: 0.3;
        }

        /* Top-right: DAU & MRR */
        #stats-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00FF00;
            font-size: 12px;
            text-align: right;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #dau-display, #mrr-display {
            margin-bottom: 8px;
        }

        /* Top-center: Objective text */
        #objective-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFFFFF;
            font-size: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Game HUD -->
    <div id="game-hud">
        <!-- Top-left: Funding & Runway -->
        <div id="funding-runway">
            <div id="rupees">💰 <span>000</span></div>
            <div id="life-hearts"></div>
        </div>

        <!-- Top-right: DAU & MRR -->
        <div id="stats-display">
            <div id="dau-display">DAU: <span>0</span></div>
            <div id="mrr-display">MRR: <span>$0</span></div>
        </div>

        <!-- Bottom-center: Objective -->
        <div id="objective-text">Complete challenges to unlock new buildings</div>
    </div>

    <script type="module" src="./index.js"></script>
</body>
</html>
